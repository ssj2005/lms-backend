spring:
  application:
    name: lms-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/lms?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: lms-secret-key-2024-library-management-system
  expiration: 86400000

file:
  upload-path: uploads/covers/

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.lms: debug
    org.springframework.security: debug
